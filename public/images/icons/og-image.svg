<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Red glow -->
  <ellipse cx="600" cy="280" rx="400" ry="200" fill="#ff3250" opacity="0.06"/>
  <!-- Band name -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="96" fill="#ff3250" letter-spacing="8">FROZEN</text>
  <text x="600" y="340" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="96" fill="#f0f0f0" letter-spacing="8">ASSETS</text>
  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="28" fill="#ffc800" letter-spacing="6">CLASSIC ROCK COVERS IN TOKYO</text>
  <!-- Bottom accent line -->
  <rect x="200" y="460" width="800" height="3" rx="1.5" fill="#ff3250" opacity="0.6"/>
  <!-- URL -->
  <text x="600" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="22" fill="#666" letter-spacing="3">FROZEN-ASSETS.BAND</text>
</svg>
